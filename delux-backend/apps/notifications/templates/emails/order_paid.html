{% extends 'emails/_base.html' %}
{% block body %}
<div style="display:inline-block;background:linear-gradient(135deg,#10b981 0%,#059669 100%);padding:18px;border-radius:20px;margin-bottom:24px;">
  <div style="font-size:36px;color:#fff;">✓</div>
</div>
<h1 style="font-family:'Bricolage Grotesque',Georgia,serif;font-size:34px;font-weight:700;letter-spacing:-0.04em;margin:0 0 12px;line-height:1.1;color:#06080f;">
  ¡Tu compra está confirmada!
</h1>
<p style="font-size:15px;color:#4c5466;line-height:1.6;margin:0 0 28px;">
  Gracias {{ customer_name }}. Recibimos tu pago y ya estamos preparando tu pedido.
</p>

<div style="background:#f5f6f8;border-radius:20px;padding:24px;margin-bottom:24px;">
  <div style="font-size:10px;letter-spacing:0.4em;color:#737c8c;text-transform:uppercase;font-weight:700;margin-bottom:6px;">Voucher</div>
  <div style="font-family:'JetBrains Mono',monospace;font-weight:700;font-size:22px;color:#06080f;margin-bottom:18px;">{{ order_code }}</div>
  <div style="border-top:1px dashed #cdd1d9;padding-top:16px;">
    <div style="font-size:10px;letter-spacing:0.4em;color:#737c8c;text-transform:uppercase;font-weight:700;">Total</div>
    <div style="font-family:'Bricolage Grotesque',Georgia,serif;font-weight:800;font-size:48px;color:#06080f;line-height:1;margin-top:4px;">${{ order_total }}</div>
    <div style="font-size:12px;color:#4c5466;margin-top:12px;">📍 Despacho en <strong>{{ branch_name }}</strong></div>
  </div>
</div>

<div style="text-align:center;">
  <a href="https://delux.com.ec/account/orders" style="display:inline-block;background:#06080f;color:#fff;text-decoration:none;padding:16px 36px;border-radius:14px;font-weight:700;font-size:12px;letter-spacing:0.25em;text-transform:uppercase;">
    Ver mi orden →
  </a>
</div>
{% endblock %}
