# ============================================================================
# Delux — nginx del contenedor "web" (sirve el SPA Angular + proxy al backend)
# Escucha en el puerto 80 DENTRO del contenedor; se publica al host via compose.
# ============================================================================

# Respeta el proto reenviado por un proxy externo (tu nginx del sistema);
# si no viene, usa el esquema propio.
map $http_x_forwarded_proto $delux_fwd_proto {
    ""      $scheme;
    default $http_x_forwarded_proto;
}

server {
    listen 80;
    server_name _;

    # Tamaño máximo de subida (imágenes/archivos/videos). Ajusta si necesitas más.
    client_max_body_size 100m;

    # Compresión
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml font/woff2;

    # ---- API REST + Django admin + schema/docs -> gunicorn (backend) ----
    location ~ ^/(api|admin)/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $delux_fwd_proto;
        proxy_read_timeout 120s;
    }

    # ---- WebSockets (notificaciones / tracking) -> daphne (websocket) ----
    location /ws/ {
        proxy_pass http://websocket:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $delux_fwd_proto;
        proxy_read_timeout 3600s;
    }

    # ---- Archivos estáticos del backend (admin de Django, DRF, swagger) ----
    location /static/ {
        alias /var/www/static/;
        access_log off;
        expires 30d;
    }

    # ---- Media subida por usuarios (logos, productos, etc.) ----
    location /media/ {
        alias /var/www/media/;
        access_log off;
        expires 30d;
    }

    # ---- SPA Angular (todo lo demás) ----
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
